name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - 'Frontend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Move app to dab-plan P2v3
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az webapp update --name v2-article-backend --resource-group dab-rg --subscription "$SUB" \
            --set serverFarmId="/subscriptions/$SUB/resourceGroups/dab-rg/providers/Microsoft.Web/serverfarms/dab-plan"

      - name: Set env vars and startup
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az webapp config set --name v2-article-backend --resource-group dab-rg --subscription "$SUB" \
            --startup-file "node --max-old-space-size=512 dist/index.js" --linux-fx-version "NODE|22-lts"
          az webapp config appsettings set --name v2-article-backend --resource-group dab-rg --subscription "$SUB" --settings \
            NODE_ENV=production PORT=8080 ENABLE_REDIS=false \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false WEBSITE_RUN_FROM_PACKAGE=0 \
            FRONTEND_URL=https://articlecreation.v2retail.net \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            "DIRECT_URL=${{ secrets.DIRECT_URL }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: Frontend
        run: |
          npm install --production=false
          npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build backend
        working-directory: Backend
        run: |
          npm install --production=false
          npx prisma generate
          npx tsc --skipLibCheck
          npm run postbuild
          npm prune --production

      - name: Bundle frontend into backend
        run: cp -r Frontend/dist Backend/public

      - name: Create deployment zip
        working-directory: Backend
        run: |
          zip -r /tmp/v2-backend.zip dist/ node_modules/ prisma/schema.prisma package.json public/ -x "*.map"
          echo "Zip size: $(du -sh /tmp/v2-backend.zip)"

      - name: Deploy zip to Azure
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az webapp deploy --name v2-article-backend --resource-group dab-rg \
            --src-path /tmp/v2-backend.zip --type zip --async true \
            --subscription "$SUB"
          echo "Zip uploaded. Waiting 90s for app to start..."
          sleep 90

      - name: Capture startup logs
        if: always()
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "=== Fetching Docker/startup logs ==="
          az webapp log download --name v2-article-backend --resource-group dab-rg \
            --subscription "$SUB" --log-file /tmp/app-logs.zip 2>&1 || true
          if [ -f /tmp/app-logs.zip ]; then
            unzip -q /tmp/app-logs.zip -d /tmp/app-logs/ 2>/dev/null || true
            echo "--- Files in log zip ---"
            find /tmp/app-logs -type f | head -20
            echo "--- Last 80 lines of app log ---"
            find /tmp/app-logs -name "*.log" | xargs grep -l "" 2>/dev/null | head -3 | xargs tail -n 80 2>/dev/null || echo "No logs found"
          else
            echo "Log download failed or no logs available"
          fi

      - name: Show domain verification ID (add TXT record in Cloudflare if hostname binding fails)
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          VERIFICATION_ID=$(az webapp show --name v2-article-backend --resource-group dab-rg \
            --subscription "$SUB" --query customDomainVerificationId -o tsv 2>/dev/null || echo "FETCH_FAILED")
          echo "======================================================"
          echo "AZURE CUSTOM DOMAIN VERIFICATION ID: $VERIFICATION_ID"
          echo "======================================================"
          echo "Add this TXT record in Cloudflare DNS (if not already present):"
          echo "  Type: TXT"
          echo "  Name: asuid.articlecreation.v2retail.net"
          echo "  Value: $VERIFICATION_ID"
          echo "  TTL: Auto"
          echo "======================================================"

      - name: Register custom hostnames
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          for HOSTNAME in articlecreation.v2retail.net articlecreationliveweb.v2retail.net; do
            echo "Binding $HOSTNAME..."
            az rest --method put \
              --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/dab-rg/providers/Microsoft.Web/sites/v2-article-backend/hostNameBindings/$HOSTNAME?api-version=2023-01-01" \
              --body "{\"properties\":{\"siteName\":\"v2-article-backend\",\"customHostNameDnsRecordType\":\"CName\",\"hostNameType\":\"Verified\",\"sslState\":\"Disabled\"}}" \
              && echo "$HOSTNAME bound OK" || echo "$HOSTNAME binding failed (may already exist)"
          done

      - name: Restart and health check
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          az webapp restart --name v2-article-backend --resource-group dab-rg --subscription "$SUB"
          echo "Waiting 60s for app to start..."
          sleep 60
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://articlecreation.v2retail.net || echo 000)
          echo "Health check: $HTTP"
          [ "$HTTP" = "200" ] && echo "LIVE ✓" || echo "Warming up (HTTP $HTTP) — check Azure logs if issue persists"
